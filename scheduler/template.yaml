AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Scheduler Lambda para gerar relatório semanal

Resources:

  WeeklyReportScheduler:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.classreview.scheduler.infra.lambda.WeeklyReportSchedulerHandler::handleRequest
      Runtime: java21
      CodeUri: target/function.zip
      MemorySize: 512
      Timeout: 120

      Policies:
        - DynamoDBReadPolicy:
            TableName: !ImportValue FeedbackTableName

        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: arn:aws:sns:us-east-1:112920803674:weekly-feedback-report

      Environment:
        Variables:
          QUARKUS_DYNAMODB_AWS_REGION: us-east-1
          FEEDBACK_TABLE_NAME: !ImportValue FeedbackTableName
          FEEDBACK_API_URL: !ImportValue FeedbackApiUrl
          WEEKLY_REPORT_TOPIC_ARN: arn:aws:sns:us-east-1:112920803674:weekly-feedback-report

      Events:
        WeeklySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: 'cron(0 9 ? * MON *)'
            Description: "Gera relatório semanal automaticamente"