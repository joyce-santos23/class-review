services:

  localstack:
    image: localstack/localstack:3.4
    container_name: localstack

    ports:
      - "4566:4566"

    environment:
      - SERVICES=dynamodb,sqs
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1

    volumes:
      - "./localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"